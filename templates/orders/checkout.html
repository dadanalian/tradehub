{% extends "base.html" %}
{% block title %}{{ t("guest_checkout_title") }}{% endblock %}
{% block content %}
<div class="container" style="max-width:800px;margin:30px auto">
<h2 style="font-size:22px;font-weight:700;margin-bottom:20px">{{ t("guest_checkout_title") }}</h2>
<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:28px">
<form method="POST"><div class="form-grid">
<div class="form-group"><label>{{ t("guest_name") }} *</label><input name="contact_name" required></div>
<div class="form-group"><label>{{ t("guest_email") }} *</label><input type="email" name="contact_email" required></div>
<div class="form-group"><label>{{ t("guest_phone") }}</label><input name="contact_phone"></div>
<div class="form-group full"><label>{{ t("guest_address") }} *</label><textarea name="shipping_address" rows="3" required></textarea></div>
<div class="form-group full"><label>Notes</label><textarea name="notes" rows="2"></textarea></div>
<div class="full" style="display:flex;justify-content:space-between;align-items:center">
<span style="font-size:18px;font-weight:700">{{ t("total") }}: <span style="color:var(--blue)">${{ "%.2f"|format(total) }}</span></span>
<button type="submit" class="btn-blue" style="padding:14px 40px;font-size:16px">{{ t("place_order") }}</button>
</div></div></form>
</div></div>{% endblock %}
