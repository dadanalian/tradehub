{% extends "base.html" %}
{% block title %}{% if product %}Edit{% else %}Add{% endif %} Product{% endblock %}
{% block content %}
<div class="container"><div class="admin-layout">
    <div class="admin-sidebar">
        <a href="{{ url_for('admin') }}">&#x1f4ca; Dashboard</a>
        <a href="{{ url_for('admin_products') }}" class="active">&#x1f4e6; Products</a>
        <a href="{{ url_for('admin_orders') }}">&#x1f4cb; Orders</a>
        <a href="{{ url_for('admin_inquiries') }}">&#x1f4e9; Inquiries</a>
    </div>
    <div class="admin-main">
        <h3 style="font-size:18px;font-weight:700;margin-bottom:20px">{% if product %}Edit{% else %}Add{% endif %} Product</h3>
        <div style="background:#fff;border-radius:4px;padding:25px">
            <form method="POST">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <div class="form-group"><label>Name (CN)</label><input name="name_zh" value="{{ product.name_zh if product else '' }}" required></div>
                    <div class="form-group"><label>Name (EN)</label><input name="name_en" value="{{ product.name_en if product else '' }}" required></div>
                    <div class="form-group"><label>Price ($)</label><input type="number" step="0.01" name="price" value="{{ product.price if product else '' }}" required></div>
                    <div class="form-group"><label>Stock</label><input type="number" name="stock" value="{{ product.stock if product else 0 }}" required></div>
                    <div class="form-group"><label>MOQ</label><input type="number" name="moq" value="{{ product.moq if product else 1 }}" required></div>
                    <div class="form-group"><label>Category</label><select name="category_id" style="width:100%;padding:10px;border:1px solid var(--jd-border);border-radius:4px">{% for c in categories %}<option value="{{ c.id }}" {{ 'selected' if product and product.category_id==c.id }}>{{ c.name_en }}</option>{% endfor %}</select></div>
                    <div class="form-group" style="grid-column:span 2"><label>Image URL</label><input name="image_url" value="{{ product.image_url if product else '' }}"></div>
                    <div class="form-group" style="grid-column:span 2"><label>Description (CN)</label><textarea name="description_zh" rows="3">{{ product.description_zh if product else '' }}</textarea></div>
                    <div class="form-group" style="grid-column:span 2"><label>Description (EN)</label><textarea name="description_en" rows="3">{{ product.description_en if product else '' }}</textarea></div>
                    <div style="grid-column:span 2">
                        <label style="margin-right:20px"><input type="checkbox" name="is_featured" {{ 'checked' if product and product.is_featured }}> Featured</label>
                        <label><input type="checkbox" name="is_active" {{ 'checked' if not product or product.is_active }}> Active</label>
                    </div>
                    <button type="submit" class="btn-lg-red" style="grid-column:span 2">Save</button>
                </div>
            </form>
        </div>
    </div>
</div></div>
{% endblock %}
