{% extends "base.html" %}{% block content %}<div class="container"><div class="admin-layout">
<div class="admin-sidebar">
<a href="{{ url_for('admin') }}" class="{{ 'active' if request.endpoint=='admin' }}">Dashboard</a>
<a href="{{ url_for('admin_products') }}" class="{{ 'active' if 'product' in request.endpoint }}">Products</a>
<a href="{{ url_for('admin_orders') }}" class="{{ 'active' if 'order' in request.endpoint }}">Orders</a>
<a href="{{ url_for('admin_inquiries') }}" class="{{ 'active' if 'inquir' in request.endpoint }}">Inquiries</a>
</div>
<div class="admin-main"><h3 style="font-size:18px;font-weight:700;margin-bottom:16px">{% if product %}Edit{% else %}Add{% endif %} Product</h3>
<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px"><form method="POST"><div class="form-grid">
<div class="form-group"><label>Name (CN)</label><input name="name_zh" value="{{ product.name_zh if product else '' }}" required></div>
<div class="form-group"><label>Name (EN)</label><input name="name_en" value="{{ product.name_en if product else '' }}" required></div>
<div class="form-group"><label>Price ($)</label><input type="number" step="0.01" name="price" value="{{ product.price if product else '' }}" required></div>
<div class="form-group"><label>Stock</label><input type="number" name="stock" value="{{ product.stock if product else 0 }}" required></div>
<div class="form-group"><label>MOQ</label><input type="number" name="moq" value="{{ product.moq if product else 1 }}"></div>
<div class="form-group"><label>Category</label><select name="category_id" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:6px">{% for c in categories %}<option value="{{ c.id }}" {{ 'selected' if product and product.category_id==c.id }}>{{ c.name_en }}</option>{% endfor %}</select></div>
<div class="form-group full"><label>Image URL</label><input name="image_url" value="{{ product.image_url if product else '' }}"></div>
<div class="form-group full"><label>Description (CN)</label><textarea name="description_zh" rows="3">{{ product.description_zh if product else '' }}</textarea></div>
<div class="form-group full"><label>Description (EN)</label><textarea name="description_en" rows="3">{{ product.description_en if product else '' }}</textarea></div>
<div class="full"><label style="margin-right:16px"><input type="checkbox" name="is_featured" {{ 'checked' if product and product.is_featured }}> Featured</label>
<label><input type="checkbox" name="is_active" {{ 'checked' if not product or product.is_active }}> Active</label></div>
<button type="submit" class="btn-blue full">Save</button></div></form></div>
</div></div></div>{% endblock %}
