{% extends "base.html" %}
{% block title %}{{ '注册' if lang == 'zh' else 'Register' }}{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4">{{ '创建账户' if lang == 'zh' else 'Create Account' }}</h3>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">{{ '用户名' if lang == 'zh' else 'Username' }}</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">{{ '邮箱' if lang == 'zh' else 'Email' }}</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">{{ '密码' if lang == 'zh' else 'Password' }}</label>
                            <input type="password" name="password" class="form-control" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">{{ '公司名称 (选填)' if lang == 'zh' else 'Company (optional)' }}</label>
                            <input type="text" name="company" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">{{ '电话 (选填)' if lang == 'zh' else 'Phone (optional)' }}</label>
                            <input type="text" name="phone" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            {{ '注册' if lang == 'zh' else 'Register' }}
                        </button>
                    </form>
                    <p class="text-center mt-3">
                        {{ '已有账户？' if lang == 'zh' else 'Already have an account?' }}
                        <a href="{{ url_for("login") }}">{{ '登录' if lang == 'zh' else 'Login' }}</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
