{% extends "base.html" %}
{% block content %}
<div class="auth-card">
    <h2>{% if lang == 'zh' %}注册 TradeHub{% else %}Sign Up{% endif %}</h2>
    <form method="POST">
        <div class="form-group"><label>{% if lang == 'zh' %}用户名{% else %}Username{% endif %}</label><input type="text" name="username" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
        <div class="form-group"><label>{% if lang == 'zh' %}密码{% else %}Password{% endif %}</label><input type="password" name="password" required minlength="6"></div>
        <div class="form-group"><label>{% if lang == 'zh' %}公司 (选填){% else %}Company (optional){% endif %}</label><input type="text" name="company"></div>
        <div class="form-group"><label>{% if lang == 'zh' %}电话 (选填){% else %}Phone (optional){% endif %}</label><input type="text" name="phone"></div>
        <button type="submit" class="submit-btn">{% if lang == 'zh' %}注册{% else %}Sign Up{% endif %}</button>
    </form>
    <div class="switch-link">{% if lang == 'zh' %}已有账户？{% else %}Have account?{% endif %} <a href="{{ url_for('login') }}">{% if lang == 'zh' %}登录{% else %}Login{% endif %}</a></div>
</div>
{% endblock %}
