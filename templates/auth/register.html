{% extends "base.html" %}{% block content %}<div class="auth-card"><h2>{{ t("register") }}</h2>
<form method="POST"><div class="form-group"><label>Username</label><input type="text" name="username" required></div>
<div class="form-group"><label>Email</label><input type="email" name="email" required></div>
<div class="form-group"><label>Password</label><input type="password" name="password" required minlength="6"></div>
<div class="form-group"><label>Company (optional)</label><input type="text" name="company"></div>
<div class="form-group"><label>Phone (optional)</label><input type="text" name="phone"></div>
<button type="submit" class="submit-btn">{{ t("register") }}</button></form>
<div class="switch-link">Have account? <a href="{{ url_for('login') }}">{{ t("login") }}</a></div>
</div>{% endblock %}
