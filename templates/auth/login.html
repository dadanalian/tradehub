{% extends "base.html" %}
{% block content %}
<div class="auth-card">
    <h2>{% if lang == 'zh' %}登录 TradeHub{% else %}Sign In{% endif %}</h2>
    <form method="POST">
        <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
        <div class="form-group"><label>{% if lang == 'zh' %}密码{% else %}Password{% endif %}</label><input type="password" name="password" required></div>
        <button type="submit" class="submit-btn">{% if lang == 'zh' %}登录{% else %}Sign In{% endif %}</button>
    </form>
    <div class="switch-link">{% if lang == 'zh' %}没有账户？{% else %}No account?{% endif %} <a href="{{ url_for('register') }}">{% if lang == 'zh' %}免费注册{% else %}Sign Up{% endif %}</a></div>
</div>
{% endblock %}
