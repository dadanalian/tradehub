{% extends "base.html" %}{% block content %}<div class="auth-card"><h2>{{ t("login") }}</h2>
<form method="POST"><div class="form-group"><label>Email</label><input type="email" name="email" required></div>
<div class="form-group"><label>Password</label><input type="password" name="password" required></div>
<button type="submit" class="submit-btn">{{ t("login") }}</button></form>
<div class="switch-link">No account? <a href="{{ url_for('register') }}">{{ t("register") }}</a></div>
</div>{% endblock %}
