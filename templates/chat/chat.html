{% extends "base.html" %}
{% block title %}Contact Us{% endblock %}
{% block content %}
<div class="container" style="max-width:700px;margin:40px auto">
<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:32px">
<h2 style="font-size:24px;font-weight:700;margin-bottom:8px">Contact Us</h2>
<p style="color:var(--gray);margin-bottom:24px">Send us a message and we will get back to you within 24 hours.</p>
<form action="{{ url_for('inquiry', product_id=1) }}" method="POST">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
<div class="form-group"><label>Your Name *</label><input name="name" required></div>
<div class="form-group"><label>Email *</label><input type="email" name="email" required></div>
<div class="form-group"><label>Company</label><input name="company"></div>
<div class="form-group"><label>Phone / WhatsApp</label><input name="phone"></div>
<div class="form-group" style="grid-column:span 2"><label>Message *</label><textarea name="message" rows="5" required placeholder="Tell us what products you are interested in, your target price, quantity needed, and any other requirements..."></textarea></div>
<button type="submit" class="btn-blue" style="grid-column:span 2;padding:14px;font-size:16px">Send Message</button>
</div></form>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:20px">
<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center">
<div style="font-size:28px;margin-bottom:8px">📧</div><h4 style="font-size:14px;font-weight:600">Email</h4><p style="font-size:12px;color:var(--gray)">support@tradehub.com</p>
</div>
<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center">
<div style="font-size:28px;margin-bottom:8px">📞</div><h4 style="font-size:14px;font-weight:600">Phone</h4><p style="font-size:12px;color:var(--gray)">+86-400-888-9999</p>
</div>
<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center">
<div style="font-size:28px;margin-bottom:8px">💬</div><h4 style="font-size:14px;font-weight:600">WhatsApp</h4><p style="font-size:12px;color:var(--gray)">+86-400-888-9999</p>
</div>
</div>
</div>{% endblock %}
